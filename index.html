<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YERIN CHOI | Portfolio</title>
    
    <link rel="stylesheet" href="./style.css">
    
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <style>
        /* 1. 브라우저 스크롤 바를 무조건 강제로 다시 만듭니다. */
        html, body {
            overflow-y: auto !important;
            overflow-x: hidden !important;
            height: auto !important;
            background-color: #101012 !important;
        }

        /* 2. 3D 별 영역이 화면 전체를 귀신처럼 막아서 스크롤을 씹어먹는 현상 전면 차단 */
        .landing {
            position: relative !important;
            width: 100vw !important;
            height: 100vh !important;
        }
        #landing-display {
            pointer-events: none !important; /* 마우스 휠이 이 영역을 관통하게 만듭니다. */
        }
        #model-canvas {
            pointer-events: auto !important; /* 오직 별을 직접 붙잡고 돌릴 때만 마우스 허용 */
        }

        /* 3. 외부 css나 js 에러로 인해 숨겨져 있을 본문을 강제로 모조리 끄집어냅니다. */
        .main-content {
            position: relative !important;
            display: block !important;
            opacity: 1 !important;
            visibility: visible !important;
            z-index: 50 !important;
            background-color: #101012 !important;
        }
        
        .panel, .accent-panel, section {
            display: block !important;
            opacity: 1 !important;
            visibility: visible !important;
            min-height: 200px;
        }

        /* 4. 화면을 까맣게 가로막고 안 열리던 로더 장막을 완전히 파괴합니다. */
        #site-loader, .site-loader, [class*="loader"], [id*="loader"] {
            display: none !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="logo">★</div>
        <nav class="nav-menu">
            <a href="#home" class="active">Home</a>
            <a href="#profile">Profile</a>
            <a href="#project-type">Project Type</a>
            <a href="#main-project">Main Project</a>
            <a href="#career">Career & Awards</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <main id="home" class="landing">
        <canvas class="landing-canvas"></canvas>
        <div id="landing-display">
            <canvas id="model-canvas"></canvas>
        </div>
    </main>

    <div class="main-content">
        
        <section id="profile" class="panel">
            <div class="hero-copy">
                <p class="sub-title">QUIET BUT SOLID</p>
                <h1>DESIGNER<br>YERIN CHOI</h1>
                <p class="description">UI/UX Designer / Student Designer</p>
            </div>
        </section>

        <section id="project-type" class="accent-panel">
            <h2>프로젝트 유형</h2>
            <div class="project-grid">
                <div class="card">UI/UX Design</div>
                <div class="card">Interaction Design</div>
                <div class="card">Branding</div>
            </div>
        </section>

        <section id="main-project" class="panel">
            <h2>주요 프로젝트</h2>
            <div class="main-project-grid">
                <div style="text-align: center; color: rgba(255,255,255,0.4); padding: 100px 0;">
                    PROJECT ARCHIVE COMING SOON
                </div>
            </div>
        </section>

        <section id="career" class="accent-panel">
            <h2>CAREER & AWARDS</h2>
            <div class="career-grid">
                <p style="color: rgba(255,255,255,0.6);">2026 Portfolio Project</p>
            </div>
        </section>

        <section id="contact" class="contact-section" style="padding: 100px 0; text-align: center;">
            <h2>CONTACT</h2>
            <p style="color: rgba(255,255,255,0.6); margin-top: 100px;">함께 성장할 영감을 나누어주세요.</p>
        </section>
        
    </div>

    <script type="module" src="./script.js"></script>
</body>
</html>
