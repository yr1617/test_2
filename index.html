<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIET BUT SOLID</title>
    
    <link rel="stylesheet" href="./style.css">
    
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <header class="topbar">
        <div class="logo">★</div>
        <nav class="nav-menu">
            <a href="#home" class="active">Home</a>
            <a href="#profile">Profile</a>
            <a href="#project-type">Project Type</a>
            <a href="#main-project">Main Project</a>
            <a href="#career">Career & Awards</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <main id="home" class="landing">
        <canvas class="landing-canvas"></canvas>
        <div id="landing-display">
            <canvas id="model-canvas"></canvas>
            <div id="crystal-fallback"></div>
        </div>
        <div class="cursor-follower"></div>
    </main>

    <div class="main-content">
        <section id="profile" class="panel">
            <div class="hero-copy">
                </div>
            <div class="reveal-card">
                </div>
        </section>

        <section id="project-type" class="accent-panel">
            </section>

        <section id="career" class="panel">
            </section>

        <section id="contact" class="contact-section">
            </section>
    </div>

    <script type="module" src="./script.js"></script>
</body>
</html>
